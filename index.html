<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Recorridos KML — GCBA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --panel: #ffffff; --accent: #0055a5; --accent2: #e8a400;
    --text: #1a1a2e; --muted: #6b7280; --border: #d1d5db;
    --success: #16a34a; --danger: #dc2626; --row-hover: #eff6ff;
    --font: 'Segoe UI', system-ui, sans-serif; --mono: 'Consolas', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--accent); color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 3px solid var(--accent2); }
  header .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  header .logo span { color: var(--accent2); }
  header .subtitle { font-size: 11px; opacity: .8; text-transform: uppercase; letter-spacing: 1px; }
  .workspace { display: flex; height: calc(100vh - 61px); overflow: hidden; }
  .sidebar { width: 380px; min-width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .map-area { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  .sidebar-inner { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 36px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font); background: #f9fafb; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--accent); background: #fff; }
  .search-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
  .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 999; background: #fff; border: 1.5px solid var(--accent); border-top: none; border-radius: 0 0 8px 8px; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.12); }
  .autocomplete-list li { list-style: none; padding: 9px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
  .autocomplete-list li:hover, .autocomplete-list li.active { background: var(--row-hover); }
  .autocomplete-list li .tipo { font-size: 11px; color: var(--muted); margin-left: 6px; }
  .autocomplete-list li .barrios { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }
  .homonimas { display: flex; flex-direction: column; gap: 6px; }
  .hom-btn { border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 12px; font-size: 13px; cursor: pointer; background: #f9fafb; text-align: left; transition: all .15s; display: flex; flex-direction: column; gap: 2px; }
  .hom-btn:hover { border-color: var(--accent); background: var(--row-hover); }
  .hom-btn.selected { border-color: var(--accent); background: #eff6ff; font-weight: 600; }
  .hom-btn .hom-tipo { font-size: 11px; color: var(--accent); font-weight: 700; }
  .hom-btn .hom-barrios { font-size: 11px; color: var(--muted); }
  .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .param-field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .param-field input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 15px; font-weight: 700; font-family: var(--font); text-align: center; outline: none; transition: border-color .15s; }
  .param-field input:focus { border-color: var(--accent); }
  .param-field .hint { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: center; }
  .street-info { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 8px; padding: 10px 13px; font-size: 13px; display: none; }
  .street-info .si-name { font-weight: 700; font-size: 15px; color: var(--accent); }
  .street-info .si-meta { color: var(--muted); margin-top: 3px; font-size: 12px; }
  .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; font-family: var(--font); transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover:not(:disabled) { background: #003f7f; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; opacity: .6; }
  .btn-secondary { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-secondary:hover { background: var(--row-hover); }
  .kml-list { display: flex; flex-direction: column; gap: 5px; max-height: 280px; overflow-y: auto; }
  .kml-item { border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all .15s; font-size: 13px; background: #fff; }
  .kml-item:hover { border-color: var(--accent); background: var(--row-hover); }
  .kml-item.active { border-color: var(--accent); background: #eff6ff; box-shadow: 0 0 0 2px #bfdbfe; }
  .kml-num { background: var(--accent); color: #fff; border-radius: 5px; padding: 2px 7px; font-size: 11px; font-weight: 800; font-family: var(--mono); min-width: 46px; text-align: center; }
  .kml-range { font-weight: 600; flex: 1; }
  .kml-cuadras { font-size: 11px; color: var(--muted); }
  .dl-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 16px; padding: 3px 5px; border-radius: 4px; transition: background .12s; }
  .dl-btn:hover { background: #bfdbfe; }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .actions .btn-secondary { flex: 1; font-size: 12px; padding: 9px; }
  #loading { display: none; position: absolute; inset: 0; background: rgba(255,255,255,.88); z-index: 500; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  #loading .spinner { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  #loading .msg { font-size: 14px; color: var(--accent); font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 9999; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--danger); }
  #toast.ok { background: var(--success); }
  .map-legend { position: absolute; bottom: 20px; right: 16px; background: #fff; border-radius: 8px; padding: 10px 14px; font-size: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.15); z-index: 100; display: none; }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .leg-line { width: 24px; height: 4px; border-radius: 2px; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">GCBA <span>·</span> Inspecciones</div>
    <div class="subtitle">Generador de Recorridos KML por Cuadras</div>
  </div>
</header>
<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-inner">
      <div>
        <div class="section-title">🔍 Buscar Calle o Avenida</div>
        <div class="search-wrap">
          <span class="icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Ej: Avellaneda, Corrientes, Rivadavia..." autocomplete="off">
          <ul class="autocomplete-list" id="autocomplete" style="display:none"></ul>
        </div>
      </div>
      <div id="homonSection" style="display:none">
        <div class="section-title">📋 Seleccionar tramo</div>
        <div class="homonimas" id="homonList"></div>
      </div>
      <div class="street-info" id="streetInfo">
        <div class="si-name" id="siName">—</div>
        <div class="si-meta" id="siMeta">—</div>
      </div>
      <div>
        <div class="section-title">⚙️ Parámetros</div>
        <div class="params-grid">
          <div class="param-field">
            <label>Cuadras por KML</label>
            <input type="number" id="nCuadras" value="10" min="1" max="200">
            <div class="hint">cuadras por recorrido</div>
          </div>
          <div class="param-field">
            <label>Cantidad de KMLs</label>
            <input type="number" id="nKmls" value="20" min="1" max="100">
            <div class="hint">archivos a generar</div>
          </div>
        </div>
      </div>
      <button class="btn-primary" id="btnGenerar" disabled>
        <span>🗺️</span> Generar Recorridos
      </button>
      <div id="kmlSection" style="display:none">
        <div class="section-title" id="kmlSectionTitle">📦 Recorridos generados</div>
        <div class="kml-list" id="kmlList"></div>
        <div class="actions">
          <button class="btn-secondary" id="btnZip">⬇ Descargar ZIP</button>
          <button class="btn-secondary" id="btnClear">✕ Limpiar</button>
        </div>
      </div>
    </div>
  </div>
  <div class="map-area">
    <div id="loading"><div class="spinner"></div><div class="msg" id="loadingMsg">Cargando datos...</div></div>
    <div id="map"></div>
    <div class="map-legend" id="mapLegend">
      <div class="leg-item"><div class="leg-line" style="background:#0055a5"></div><span>Recorrido activo</span></div>
      <div class="leg-item"><div class="leg-line" style="background:#e8a400;opacity:.6"></div><span>Otros recorridos</span></div>
    </div>
  </div>
</div>
<div id="toast"></div>

let STREETS = [], selectedStreet = null, generatedKmls = [], activeKmlIdx = -1;
let map, layerGroup;

document.addEventListener('DOMContentLoaded', async () => {
  map = L.map('map', { center: [-34.615, -58.44], zoom: 13 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
  layerGroup = L.layerGroup().addTo(map);

  showLoading('Descomprimiendo callejero CABA...');
  try {
    STREETS = await loadData();
    hideLoading();
    toast('✅ ' + STREETS.length + ' calles cargadas', 'ok');
    initSearch();
  } catch(e) {
    hideLoading();
    toast('❌ Error: ' + e.message, 'error');
  }

  document.getElementById('btnGenerar').addEventListener('click', generateKmls);
  document.getElementById('btnZip').addEventListener('click', downloadZip);
  document.getElementById('btnClear').addEventListener('click', clearAll);
});

async function loadData() {
  const bin = Uint8Array.from(atob(DATA_B64), c => c.charCodeAt(0));
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bin); writer.close();
  const chunks = [], reader = ds.readable.getReader();
  while(true) { const {done,value} = await reader.read(); if(done) break; chunks.push(value); }
  const total = chunks.reduce((a,c)=>a+c.length,0);
  const merged = new Uint8Array(total); let off=0;
  for(const c of chunks){merged.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder('utf-8').decode(merged));
}

function initSearch() {
  const input = document.getElementById('searchInput');
  const list = document.getElementById('autocomplete');
  let deb;
  input.addEventListener('input', ()=>{ clearTimeout(deb); deb=setTimeout(()=>doSearch(input.value.trim()),120); });
  input.addEventListener('keydown', e=>{
    const items=list.querySelectorAll('li'), active=list.querySelector('li.active');
    if(e.key==='ArrowDown'){e.preventDefault();const n=active?active.nextElementSibling:items[0];if(n){active&&active.classList.remove('active');n.classList.add('active');n.scrollIntoView({block:'nearest'});}}
    else if(e.key==='ArrowUp'){e.preventDefault();const p=active?active.previousElementSibling:items[items.length-1];if(p){active&&active.classList.remove('active');p.classList.add('active');p.scrollIntoView({block:'nearest'});}}
    else if(e.key==='Enter'){e.preventDefault();const a=list.querySelector('li.active')||items[0];if(a)a.click();}
    else if(e.key==='Escape'){list.style.display='none';}
  });
  document.addEventListener('click', e=>{ if(!input.contains(e.target)&&!list.contains(e.target)) list.style.display='none'; });
}

function doSearch(q) {
  const list=document.getElementById('autocomplete');
  if(q.length<2){list.style.display='none';return;}
  const qu=normalize(q);
  const hits=STREETS.filter(s=>normalize(s.n).includes(qu)).slice(0,30);
  if(!hits.length){list.innerHTML='<li style="color:#9ca3af;cursor:default;font-size:12px">Sin resultados</li>';list.style.display='block';return;}
  list.innerHTML='';
  for(const s of hits){
    const li=document.createElement('li');
    li.innerHTML='<strong>'+s.n+'</strong>'+(s.t?'<span class=tipo> · '+s.t+'</span>':'')+
      '<span class=barrios>'+s.b.filter(Boolean).slice(0,3).join(', ')+(s.b.filter(Boolean).length>3?'…':'')+'</span>';
    li.addEventListener('click',()=>{list.style.display='none';document.getElementById('searchInput').value=s.n;handleSelection(s);});
    list.appendChild(li);
  }
  list.style.display='block';
}

function normalize(s){return s.toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,'');}

function handleSelection(s) {
  // Buscar si hay homónimas por nombre normalizado
  const qu = normalize(s.n).split(' ').slice(0,2).join(' ');
  const group = STREETS.filter(x => normalize(x.n).startsWith(qu) && Math.abs(normalize(x.n).length - normalize(s.n).length) < 8);
  if(group.length > 1) {
    showHomonimas(group);
  } else {
    selectStreet(s);
  }
}

function showHomonimas(group) {
  clearResults(true);
  const sec=document.getElementById('homonSection'), lst=document.getElementById('homonList');
  sec.style.display='block'; lst.innerHTML='';
  // Preview de todas en mapa
  layerGroup.clearLayers();
  const allBounds=[];
  for(const s of group){
    const pts=s.c.flatMap(c=>c[2].map(p=>[p[1],p[0]]));  // [lat,lon]
    if(pts.length){L.polyline(pts,{color:'#94a3b8',weight:3,opacity:.5}).addTo(layerGroup);allBounds.push(...pts);}
    const btn=document.createElement('button');
    btn.className='hom-btn';
    btn.innerHTML='<span class=hom-tipo>'+(s.t||'Calle')+'</span><strong>'+s.n+'</strong><span class=hom-barrios>'+s.b.filter(Boolean).join(', ')+'</span>';
    btn.addEventListener('click',()=>{lst.querySelectorAll('.hom-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectStreet(s);});
    lst.appendChild(btn);
  }
  if(allBounds.length) fitBoundsOnPoints(allBounds);
}

function selectStreet(s) {
  selectedStreet=s;
  document.getElementById('homonSection').style.display='none';
  const info=document.getElementById('streetInfo'); info.style.display='block';
  document.getElementById('siName').textContent=s.n;
  const barrios=s.b.filter(Boolean);
  document.getElementById('siMeta').textContent=(s.t?s.t+' · ':'')+s.c.length+' cuadras · '+(barrios.length?barrios.join(', ')+' · ':'')+
    'Alturas: '+s.c[0][0]+' – '+s.c[s.c.length-1][1];
  document.getElementById('btnGenerar').disabled=false;
  // Preview en mapa
  layerGroup.clearLayers();
  const pts=s.c.flatMap(c=>c[2].map(p=>[p[1],p[0]]));
  if(pts.length){L.polyline(pts,{color:'#94a3b8',weight:4,opacity:.6}).addTo(layerGroup);fitBoundsOnPoints(pts);}
}

function fitBoundsOnPoints(pts) {
  if(!pts||!pts.length) return;
  try {
    const lats=pts.map(p=>p[0]), lons=pts.map(p=>p[1]);
    const bounds=[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]];
    map.fitBounds(bounds,{padding:[40,40],maxZoom:16});
  } catch(e){}
}

function generateKmls() {
  if(!selectedStreet) return;
  const nCuad=parseInt(document.getElementById('nCuadras').value)||10;
  const nKml=parseInt(document.getElementById('nKmls').value)||20;
  const cuadras=selectedStreet.c;
  generatedKmls=[];
  let offset=0;
  for(let k=0;k<nKml;k++){
    if(offset>=cuadras.length) break;
    const slice=cuadras.slice(offset,offset+nCuad); offset+=nCuad;
    const hIni=slice[0][0], hFin=slice[slice.length-1][1];
    const allCoords=slice.flatMap(c=>c[2]);
    const name=sanitize(selectedStreet.n)+'_KML'+String(k+1).padStart(2,'0')+'_'+hIni+'al'+hFin+'.kml';
    generatedKmls.push({name, content:buildKml(selectedStreet.n,k+1,hIni,hFin,allCoords), coords:allCoords, hIni, hFin, idx:k});
  }
  renderKmlList();
  if(generatedKmls.length) highlightKml(0);
  document.getElementById('kmlSection').style.display='block';
  document.getElementById('mapLegend').style.display='block';
  document.getElementById('kmlSectionTitle').textContent='📦 '+generatedKmls.length+' recorridos generados';
  toast('✅ '+generatedKmls.length+' KMLs generados','ok');
}

function buildKml(streetName,num,hIni,hFin,coords){
  const coordStr=coords.map(c=>c[0].toFixed(6)+','+c[1].toFixed(6)+',0').join(' ');
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${esc(streetName)} - Rec ${num} (${hIni} al ${hFin})</name>
    <Style id="ls"><LineStyle><color>ffA55500</color><width>4</width></LineStyle></Style>
    <Placemark>
      <name>${esc(streetName)} ${hIni}-${hFin}</name>
      <description>Recorrido ${num} · Alturas ${hIni} al ${hFin}</description>
      <styleUrl>#ls</styleUrl>
      <LineString><tessellate>1</tessellate><coordinates>${coordStr}</coordinates></LineString>
    </Placemark>
  </Document>
</kml>`;}

function renderKmlList(){
  const list=document.getElementById('kmlList'); list.innerHTML='';
  for(const kml of generatedKmls){
    const item=document.createElement('div'); item.className='kml-item'; item.dataset.idx=kml.idx;
    item.innerHTML='<span class="kml-num">KML '+(kml.idx+1)+'</span>'+
      '<span class="kml-range">'+kml.hIni+' – '+kml.hFin+'</span>'+
      '<span class="kml-cuadras">'+kml.coords.length+' pts</span>'+
      '<button class="dl-btn" title="Descargar">⬇</button>';
    item.querySelector('.dl-btn').addEventListener('click',e=>{e.stopPropagation();downloadKml(kml);});
    item.addEventListener('click',()=>highlightKml(kml.idx));
    list.appendChild(item);
  }
}

function highlightKml(idx){
  activeKmlIdx=idx;
  layerGroup.clearLayers();
  for(const kml of generatedKmls){
    if(kml.idx!==idx){
      L.polyline(kml.coords.map(c=>[c[1],c[0]]),{color:'#e8a400',weight:3,opacity:.4}).addTo(layerGroup);
    }
  }
  const active=generatedKmls[idx];
  if(active){
    const pts=active.coords.map(c=>[c[1],c[0]]);
    L.polyline(pts,{color:'#0055a5',weight:6,opacity:.9}).addTo(layerGroup);
    fitBoundsOnPoints(pts);
  }
  document.querySelectorAll('.kml-item').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.idx)===idx));
}

function downloadKml(kml){
  const blob=new Blob([kml.content],{type:'application/vnd.google-earth.kml+xml'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=kml.name; a.click();
  toast('📥 '+kml.name,'ok');
}

async function downloadZip(){
  if(!generatedKmls.length) return;
  const zip=new JSZip(), folder=zip.folder(sanitize(selectedStreet.n));
  for(const kml of generatedKmls) folder.file(kml.name,kml.content);
  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=sanitize(selectedStreet.n)+'_KMLs.zip'; a.click();
  toast('📦 ZIP descargado ('+generatedKmls.length+' archivos)','ok');
}

function clearAll() { clearResults(false); }

function clearResults(keepStreet){
  if(!keepStreet){
    selectedStreet=null;
    document.getElementById('streetInfo').style.display='none';
    document.getElementById('btnGenerar').disabled=true;
    document.getElementById('searchInput').value='';
  }
  generatedKmls=[]; activeKmlIdx=-1;
  layerGroup.clearLayers();
  document.getElementById('kmlSection').style.display='none';
  document.getElementById('mapLegend').style.display='none';
  document.getElementById('homonSection').style.display='none';
}

function sanitize(s){return s.replace(/[^a-zA-Z0-9_\-]/g,'_').replace(/__+/g,'_');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLoading(msg){document.getElementById('loadingMsg').textContent=msg||'Cargando...';document.getElementById('loading').style.display='flex';}
function hideLoading(){document.getElementById('loading').style.display='none';}
let _tt;
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3000);}
</script>
</body>
